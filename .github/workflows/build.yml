name: Build & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Build ──────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - key: zero-4mb
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,PSRAM=enabled"
            define: BOARD_S3_ZERO

          - key: geek-16mb
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=16M,PartitionScheme=app3M_fat9M_16MB,PSRAM=opi"
            define: BOARD_S3_GEEK

          - key: generic-4mb
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc"
            define: BOARD_S3_GENERIC_4MB

          - key: generic-16mb
            fqbn: "esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=16M,PartitionScheme=app3M_fat9M_16MB"
            define: BOARD_S3_GENERIC_16MB

    steps:
      - uses: actions/checkout@v4

      - name: Set up arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache arduino-cli core and libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: arduino-${{ runner.os }}-

      - name: Add ESP32 board index
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli config set library.enable_unsafe_install true

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install --git-url https://github.com/me-no-dev/AsyncTCP.git
          arduino-cli lib install --git-url https://github.com/me-no-dev/ESPAsyncWebServer.git

      - name: Generate admin_panel.h
        run: python3 build_panel.py

      - name: Patch config.h for CI board selection
        run: |
          sed -i 's/^#define BOARD_S3_GEEK/\/\/ #define BOARD_S3_GEEK/' config.h
          sed -i 's/^#define BOARD_S3_ZERO/\/\/ #define BOARD_S3_ZERO/' config.h

      - name: Stage sketch in named directory
        run: cp -r . /tmp/ESP32S3_WebServer

      - name: Compile ${{ matrix.key }}
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --build-property "compiler.cpp.extra_flags=-D${{ matrix.define }}" \
            --output-dir ${{ github.workspace }}/out \
            /tmp/ESP32S3_WebServer

      - name: Stage binaries
        run: |
          mkdir -p staged/${{ matrix.key }}
          cp out/ESP32S3_WebServer.ino.merged.bin \
             staged/${{ matrix.key }}/ESP32S3_WebServer.ino.merged.bin
          cp out/ESP32S3_WebServer.ino.bin \
             staged/${{ matrix.key }}/fwupdate.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.key }}
          path: staged/

  # ── Deploy ─────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all firmware binaries
        uses: actions/download-artifact@v4
        with:
          pattern: fw-*
          path: site/firmware
          merge-multiple: true

      - name: Assemble site
        run: |
          cp flash.html site/index.html
          cp firmware/manifest-*.json site/firmware/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Release ────────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fw-*
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/geek-16mb/fwupdate.bin
            release/geek-16mb/ESP32S3_WebServer.ino.merged.bin
            release/zero-4mb/fwupdate.bin
            release/zero-4mb/ESP32S3_WebServer.ino.merged.bin
            release/generic-4mb/fwupdate.bin
            release/generic-4mb/ESP32S3_WebServer.ino.merged.bin
            release/generic-16mb/fwupdate.bin
            release/generic-16mb/ESP32S3_WebServer.ino.merged.bin
